name: Build and Release

on:
  push:
    tags:
      - "creation-station-v*"
      - "djehuti-router-v*"
      - "djehuti-drivers-v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch JUCE
        shell: pwsh
        run: |
          git clone --depth 1 --branch 7.0.12 https://github.com/juce-framework/JUCE.git "$env:RUNNER_TEMP\JUCE"

      - name: Classify release
        id: classify
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME

          switch -Regex -CaseSensitive ($tag) {
            '^creation-station-v(?<version>\d+\.\d+\.\d+)(?:-(?<channel>[0-9A-Za-z.-]+))?$' {
              $productSlug = "creation-station"
              $displayName = "Creation Station"
              $kind = "app"
              $cmakeTarget = "CreativeWorkstation"
              $componentName = "CreativeWorkstation"
              break
            }

            default {
              throw "Tag '$tag' must start with creation-station-v."
            }
          }

          $versionText = $Matches.version
          $explicitChannel = $Matches.channel
          $channel = "stable"
          $prerelease = "false"

          if ($explicitChannel) {
            if ($explicitChannel -match '^(alpha|beta)$') {
              $channel = $explicitChannel
            }
            else {
              $channel = $explicitChannel
            }

            $prerelease = "true"
          }
          else {
            $parts = $versionText.Split('.')
            $major = [int]$parts[0]
            $minor = [int]$parts[1]

            if ($major -eq 0 -and $minor -lt 5) {
              $channel = "alpha"
              $prerelease = "true"
            }
            elseif ($major -eq 0 -and $minor -ge 5) {
              $channel = "beta"
              $prerelease = "true"
            }
          }

          $suffix = ""
          if ($channel -ne "stable") {
            $suffix = " ($channel)"
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "product_slug=$productSlug"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "display_name=$displayName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "kind=$kind"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "cmake_target=$cmakeTarget"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "component_name=$componentName"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$versionText"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "channel=$channel"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "prerelease=$prerelease"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "suffix=$suffix"

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -A x64 -DCMAKE_BUILD_TYPE=Release -DJUCE_DIR="$env:RUNNER_TEMP\JUCE"

      - name: Build app
        shell: pwsh
        run: |
          cmake --build build --config Release --target ${{ steps.classify.outputs.cmake_target }}

      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $stageRoot = Join-Path $PWD "artifacts\stage"
          New-Item -ItemType Directory -Force -Path $stageRoot | Out-Null

          $installRoot = Join-Path $stageRoot "${{ steps.classify.outputs.product_slug }}"
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null

          cmake --install build --config Release --prefix $installRoot --component ${{ steps.classify.outputs.component_name }}

          $exe = Get-ChildItem $installRoot -Recurse -File | Where-Object { $_.Extension -eq '.exe' } | Select-Object -First 1
          if (-not $exe) {
            throw "Could not find the packaged executable for ${{ steps.classify.outputs.display_name }}."
          }

          $zipName = Join-Path $PWD ("artifacts\{0}.zip" -f "${{ steps.classify.outputs.tag }}")
          if (Test-Path $zipName) {
            Remove-Item $zipName -Force
          }

          Compress-Archive -Path (Join-Path $stageRoot "${{ steps.classify.outputs.product_slug }}\*") -DestinationPath $zipName -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.classify.outputs.product_slug }}
          path: artifacts/*.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.classify.outputs.display_name }} ${{ steps.classify.outputs.version }}${{ steps.classify.outputs.suffix }}
          prerelease: ${{ steps.classify.outputs.prerelease }}
          files: artifacts/*.zip
